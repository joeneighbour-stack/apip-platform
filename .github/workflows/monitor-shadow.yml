name: Shadow Trade Monitor

on:
  schedule:
    # Every 5 minutes during market hours (Mon-Fri, 06:00-22:00 UTC)
    - cron: '*/5 6-22 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Must complete before next 5-min run
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: intelligence-engine/package-lock.json

      - name: Install dependencies
        working-directory: intelligence-engine
        run: npm ci

      - name: Run shadow trade monitor
        working-directory: intelligence-engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_CANDLE_API_KEY: ${{ secrets.FINNHUB_CANDLE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: npx tsx src/scripts/monitorShadowTrades.ts
