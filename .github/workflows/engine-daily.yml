# ============================================================================
# APIP Intelligence Engine -- Daily Scheduled Runs
# ============================================================================
# Runs the three session engine cycles at the correct UK times.
# All times in UTC. UK = UTC+1 (BST summer) / UTC+0 (GMT winter).
#
# Schedule:
#   05:30 UK (04:30 UTC) -- populateMarketStateDaily
#   05:35 UK (04:35 UTC) -- derive market regime
#   05:45 UK (04:45 UTC) -- 
          FINNHUB_CANDLE_API_KEY: ${{ secrets.FINNHUB_CANDLE_API_KEY }}

  engine-european:
    name: Engine Session -- European
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'engine-european' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '50 4')
    defaults:
      run:
        working-directory: intelligence-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: intelligence-engine/package-lock.json
      - run: npm ci
      - run: npx tsx src/scripts/runEngineSession.ts --session=EUROPEAN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  snapshot-us:
    name: Intraday Snapshot -- US
    runs-on: ubuntu-latest
    if: |
