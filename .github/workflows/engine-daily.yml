# ============================================================================
# APIP Intelligence Engine -- Daily Scheduled Runs
# ============================================================================
name: APIP Engine

on:
  schedule:
    - cron: '*/5 5-21 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '35 4 * * 1-5'
    - cron: '45 4 * * 1-5'
    - cron: '50 4 * * 1-5'
    - cron: '45 10 * * 1-5'
    - cron: '50 10 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '50 14 * * 1-5'
    - cron: '0 5 * * 1'
    - cron: '15 5 * * 1'
    - cron: '30 5 * * 1'
    - cron: '0 22 * * 1-5'
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run manually'
        required: true
        type: choice
        options:
          - populate-daily
          - derive-regime
          - snapshot-european
          - engine-european
          - snapshot-us
          - engine-us
          - snapshot-apac
          - engine-apac
          - generate-profiles
          - calculate-kpis
          - calculate-shadow-kpis
          - shadow-lifecycle
          - condition-awareness
          - import-actual-trades
          - generate-post-trade-reviews

jobs:
  populate-daily:
    name: Populate Market State Daily
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'populate-daily' ||
      github.event_name == 'schedule' && github.event.schedule == '30 4 * * 1-5'
    defaults:
      run:
        working-directory: intelligence-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: intelligence-engine/package-lock.json
      - run: npm ci
      - run: npx tsx src/scripts/populateMarketStateDaily.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_CANDLE_API_KEY: ${{ secrets.FINNHUB_CANDLE_API_KEY }}

  derive-regime:
    name: Derive Market Regime
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'derive-regime' ||
      github.event_name == 'schedule' && github.event.schedule == '35 4 * * 1-5' ||
      github.event_name == 'schedule' && github.event.schedule == '15 5 * * 1'
    defaults:
      run:
        working-directory: intelligence-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: intelligence-engine/package-lock.json
      - run: npm ci
      - run: npx tsx src/scripts/deriveMarketRegime.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  snapshot-european:
